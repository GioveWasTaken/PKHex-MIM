name: Build PKHeX-Plugins

on:
  push:
    branches: [ cherrytree ]

env:
  SOLUTION: PKHeX-Plugins.sln
  BUILD_PLATFORM: Any CPU
  BUILD_CONFIGURATION: Release
  DOTNET_VERSION: '10.0.103'

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout PKHeX-Plugins
      uses: actions/checkout@v4

    - name: Setup .NET 10
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: ${{ env.DOTNET_VERSION }}

    - name: Restore NuGet packages for PKHeX-Plugins
      run: dotnet restore ${{ env.SOLUTION }}

    - name: Clone PKHeX repository
      shell: cmd
      run: git clone -q --depth=5 --branch=master https://github.com/kwsch/PKHeX.git PKHeX

    - name: Restore NuGet packages for PKHeX
      run: dotnet restore PKHeX/PKHeX.sln

    - name: Build PKHeX.Core
      run: dotnet build PKHeX/PKHeX.Core/PKHeX.Core.csproj -c ${{ env.BUILD_CONFIGURATION }} -p:Platform="${{ env.BUILD_PLATFORM }}"

    - name: Copy PKHeX.Core to NuGet cache
      shell: cmd
      run: |
        setlocal enabledelayedexpansion
        set "pkgDir=%USERPROFILE%\.nuget\packages\pkhex.core"
        if exist "!pkgDir!" (
          for /f "delims=" %%D in ('dir /b /od "!pkgDir!" ^| findstr /r "." ^| sort /r') do (
            set "nugetver=%%D"
            goto :found
          )
          :found
          if not exist "!pkgDir!\!nugetver!\lib\net10.0" mkdir "!pkgDir!\!nugetver!\lib\net10.0"
          copy "PKHeX\PKHeX.Core\bin\Any CPU\Release\net10.0\PKHeX.Core.dll" "!pkgDir!\!nugetver!\lib\net10.0\"
        )

    - name: Build PKHeX-Plugins
      run: dotnet build ${{ env.SOLUTION }} -c ${{ env.BUILD_CONFIGURATION }} -p:Platform="${{ env.BUILD_PLATFORM }}"

    - name: Prepare artifacts
      shell: cmd
      run: |
        if not exist bin mkdir bin
        copy "AutoLegalityMod\bin\Release\net10.0-windows\AutoModPlugins.dll" "bin\"

    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: PKHeX-Plugins
        path: bin/
